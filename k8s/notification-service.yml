apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: bankplatform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: bankplatform/notification-service:1.0.0
          ports:
            - containerPort: 8089
          env:
            - name: PORT
              value: "8089"
          readinessProbe:
            httpGet:
              path: /notifications/health
              port: 8089
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: bankplatform
spec:
  selector:
    app: notification-service
  ports:
    - port: 8089
      targetPort: 8089
